name: litelight
description: "A Lightweight Lighting App"

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  android_intent_plus: ^6.0.0
  battery_plus: ^7.0.0
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  permission_handler: ^12.0.1
  sensors_plus: ^7.0.0
  torch_light: ^1.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - images/icon.png
  #   - images/a_dot_ham.jpeg
  fonts:
    - family: Space Grotesk
      fonts:
        - asset: fonts/SpaceGrotesk-Bold.ttf
          weight: 700
        - asset: fonts/SpaceGrotesk-Regular.ttf
          weight: 400
    - family: Inter
      fonts:
        - asset: fonts/Inter-Bold.ttf
          weight: 700
        - asset: fonts/Inter-Regular.ttf
          weight: 400
